<main class="login-page">
  <section class="brand-panel" aria-label="Apresentacao do sistema">
    <div class="brand-mark">PDS</div>
    <div>
      <p class="eyebrow">Projeto de teste</p>
      <h1>Entre para continuar</h1>
      <p class="intro">
        Uma primeira tela de login para conectar o frontend Angular ao seu servidor Django nas proximas etapas.
      </p>
    </div>
  </section>

  <section class="login-card" aria-labelledby="login-title">
    <div class="login-header">
      <p class="eyebrow">Bem-vindo</p>
      <h2 id="login-title">Login</h2>
      <p>Acesse sua conta com e-mail e senha.</p>
    </div>

    <form class="login-form">
      <label for="email">E-mail</label>
      <input id="email" name="email" type="email" autocomplete="email" placeholder="seu@email.com" />

      <label for="password">Senha</label>
      <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Digite sua senha" />

      <div class="form-row">
        <label class="remember">
          <input type="checkbox" name="remember" />
          <span>Lembrar-me</span>
        </label>
        <a href="/" aria-label="Recuperar senha">Esqueci a senha</a>
      </div>

      <button class="primary-button" type="button">Entrar</button>
    </form>

    <div class="divider">
      <span>ou</span>
    </div>

    <button class="google-button" type="button" aria-label="Login com Google ainda indisponivel">
      <span class="google-icon" aria-hidden="true">G</span>
      Continuar com Google
    </button>

    <p class="signup-text">
      Ainda nao tem conta?
      <a href="/">Criar conta</a>
    </p>
  </section>
</main>
