<main class="auth-page">
  <section class="brand-panel" aria-label="Apresentacao do cadastro">
    <div class="brand-mark">PDS</div>
    <div>
      <p class="eyebrow">Projeto de teste</p>
      <h1>Crie sua conta</h1>
      <p class="intro">
        Cadastre seus dados iniciais para, depois, conectar essa tela ao backend Django.
      </p>
    </div>
  </section>

  <section class="auth-card" aria-labelledby="signup-title">
    <div class="auth-header">
      <p class="eyebrow">Novo acesso</p>
      <h2 id="signup-title">Criar conta</h2>
      <p>Preencha as informacoes para iniciar seu cadastro.</p>
    </div>

    <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">
      <label for="username">Nome de usuario</label>
      <input id="username" name="username" type="text" autocomplete="username" placeholder="Seu usuario" formControlName="username" />

      <label for="email">E-mail</label>
      <input id="email" name="email" type="email" autocomplete="email" placeholder="seu@email.com" formControlName="email" />

      <label for="password">Senha</label>
      <input id="password" name="password" type="password" autocomplete="new-password" placeholder="Crie uma senha" formControlName="password" />

      <label for="confirm-password">Confirmar senha</label>
      <input
        id="confirm-password"
        name="confirm-password"
        type="password"
        autocomplete="new-password"
        placeholder="Repita sua senha"
        formControlName="password_confirm"
      />

      <button class="primary-button" type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Criando...' : 'Criar conta' }}
      </button>
    </form>

    @if (message) {
      <p class="form-message" [class.form-message--error]="messageType === 'error'">{{ message }}</p>
    }

    <div class="divider">
      <span>ou</span>
    </div>

    <button class="google-button" type="button" aria-label="Cadastro com Google ainda indisponivel">
      <span class="google-icon" aria-hidden="true">G</span>
      Criar com Google
    </button>

    <p class="switch-text">
      Ja tem conta?
      <a routerLink="/">Fazer login</a>
    </p>
  </section>
</main>
